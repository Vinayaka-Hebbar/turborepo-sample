name: Code Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  code-quality:
    name: Code Quality Review
    runs-on: ubuntu-latest
    env:
      TURBO_CACHE_DIR: .turbo-cache
      TURBO_TELEMETRY_DISABLED: 1
      TURBO_RUN_SUMMARY: true
      TURBO_UI: "stream"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Install Reviewdog CLI
      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install dependencies
        run: npm ci

      # Static Analysis: Run ESLint using Reviewdog for automated PR reviews
      - name: Run ESLint
        if: always()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run lint -- --log-prefix=none | reviewdog -f=eslint \
            -reporter=github-pr-check \
            -filter-mode=added \
            -fail-level=error

      # Type Checking: Perform TypeScript compilation checks and report errors
      - name: Run Turborepo Reviewer
        uses: built-for-dx/turbo-tsc-reviewer@main
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Execution Report: Generate a summary of the Turborepo run and results
      - name: Turborepo Summary
        uses: charpeni/turborepo-summary-action@v1
        if: always()
